# ClawBench 配置示例
# 使用方法：
# Linux/macOS:
#   1. 复制此文件为 config.yaml：cp config.example.yaml config.yaml
#   2. 根据实际情况修改配置项
#   3. 启动服务：./server.sh
# Windows:
#   1. 复制此文件为 config.yaml：copy config.example.yaml config.yaml
#   2. 根据实际情况修改配置项
#   3. 启动服务：.\server.ps1

# 服务端口
port: 20000

# 项目监控目录（AI 可访问的文件根路径）
# Linux 示例：/home/your-username
# macOS 示例：/Users/your-username
# Windows 示例：C:\Users\your-username
watch_dir: "/home/your-username"

# 访问密码（可选，留空则无需登录）
# 建议设置强密码保护服务安全
password: "your-password-here"

# Upload limits
upload:
  max_size_mb: 100   # Maximum single file upload size in MB
  max_files: 20      # Maximum number of files per upload

# TLS (HTTPS) configuration
# 公网部署时强烈建议启用 HTTPS
tls:
  enabled: false     # 启用后需配置证书路径
  # Linux/macOS 示例：
  cert_file: "/path/to/fullchain.pem"   # 证书文件，如 Let's Encrypt
  key_file: "/path/to/privkey.pem"      # 私钥文件
  # Windows 示例：
  # cert_file: "C:\certs\fullchain.pem"
  # key_file: "C:\certs\privkey.pem"

# Dev mode ports (separate from release to avoid conflicts)
dev:
  port: 20002        # 开发版后端端口
  frontend_port: 20001 # Vite 前端端口（HMR 热更新）
  host: "localhost"  # 绑定地址："0.0.0.0" 允许公网访问，"localhost" 仅限本地

# Chat UI settings
chat:
  initial_messages: 20    # 初始加载的消息条数
  page_size: 20           # 每次懒加载追加的消息条数
  collapsed_height: 150   # 历史消息折叠高度（像素）
  # 快捷发送预设（输入框为空时，点击发送按钮弹出菜单选择）
  # Key: 显示在菜单上的短标签（可带 emoji），Value: 实际发送的消息文本
  quick_send:
    "▶️ 继续": "继续"
    "👌 OK": "OK"
    "🔨 编译": "帮我编译当前项目，优先使用项目中已有的脚本。"
    "🔄 重启调试": "帮我重启当前项目的调试版本服务，优先使用项目中已经有的脚本。"
    "🚀 重启服务": "帮我重启当前项目的发布版本服务，优先使用项目中已经有的脚本。"
    "📦 提交": "提交"
    "👀 浏览变更": "工作区改了什么"
    "🗑️ 丢弃变更": "放弃工作区修改"

# 会话数量限制
session:
  max_count: 10  # 会话数量上限，默认10，达到上限后需删除旧会话才能创建新会话

# TTS (语音合成) 配置
# 支持四种引擎：
#   minimax — 云端合成，音质最佳，需要 mmx CLI 和 API 配额（默认）
#   edge    — 微软 Edge TTS，免费无限制，需要网络
#   piper   — 本地离线合成，无需网络，速度极快，需要安装 piper 二进制和语音模型
#   kokoro  — 本地离线合成，音质优秀，需要 Python + kokoro-onnx + ONNX 模型
tts:
  engine: "minimax"                                       # TTS引擎: "minimax" (默认), "edge" (免费无限制), "piper" (本地离线), "kokoro" (本地高质量)

  # --- 总结后端（将AI回复压缩为适合朗读的摘要） ---
  # summarize_backend: 决定用哪个 AI 来做总结
  #   "mmx"       — 使用 mmx text chat（默认，轻量快速，需要 mmx CLI）
  #   "claude"    — 使用 Claude CLI（总结质量高，启动开销较大）
  #   "codebuddy" — 使用 CodeBuddy CLI
  #   "gemini"    — 使用 Gemini CLI
  #   "opencode"  — 使用 OpenCode CLI
  #   "codex"     — 使用 Codex CLI
  #   "ollama"    — 使用 Ollama HTTP API（本地推理，需要运行 Ollama 服务）
  summarize_backend: "mmx"
  summarize_model: "MiniMax-M2.7"                      # 总结模型（留空则使用后端默认；各后端默认: mmx→MiniMax-M2.7, ollama→gemma3:270m, claude→claude-sonnet-4-6, codebuddy→glm-5.1, gemini→gemini-3-pro-preview, opencode→opencode/minimax-m2.5-free, codex→codex-MiniMax-M2.7）

  # --- 语速与音色（所有引擎共享） ---
  speed: 1                                             # 语速倍率（1.0=正常速度；edge 会转为百分比速率如 +0%）
  # voice: 见下方各引擎样例

  # ============================================================
  # TTS引擎 + 总结后端 组合样例 —— 取消注释对应的一组即可
  # ============================================================

  # --- 组合1: Edge TTS + mmx总结（默认，免费无限制） ---
  # engine: "edge"
  # summarize_backend: "mmx"
  # summarize_model: "MiniMax-M2.7"
  # voice: "zh-CN-XiaoxiaoNeural"                       # 音色ID
  #                                                    #   常用中文: zh-CN-XiaoxiaoNeural, zh-CN-YunxiNeural, zh-CN-YunjianNeural
  #                                                    #   常用英文: en-US-JennyNeural, en-US-GuyNeural
  #                                                    #   完整列表: https://speech.microsoft.com/portal/voicegallery
  # speed: 1                                            # 语速倍率，自动转换为百分比速率（1.2 → +20%，0.8 → -20%）

  # --- 组合2: Edge TTS + Claude总结（高质量，CLI启动较慢） ---
  # engine: "edge"
  # summarize_backend: "claude"
  # summarize_model: "claude-sonnet-4-6"
  # voice: "zh-CN-XiaoxiaoNeural"
  # speed: 1

  # --- 组合3: Edge TTS + Gemini总结 ---
  # engine: "edge"
  # summarize_backend: "gemini"
  # summarize_model: "gemini-3-pro-preview"
  # voice: "zh-CN-XiaoxiaoNeural"
  # speed: 1

  # --- 组合4: MiniMax（云端，音质最佳） ---
  # engine: "minimax"
  # summarize_backend: "mmx"
  # summarize_model: "MiniMax-M2.7"
  # voice: "female-chengshu"                            # 音色ID: female-chengshu, male-qn-qingse 等（默认: female-chengshu）
  # tts_model: "speech-2.8-hd"                          # 语音合成模型（默认: "speech-2.8-hd"）
  # language: "zh"                                      # 语言增强代码: zh, en, ja 等（默认: "zh"）
  # speed: 1.5                                          # 语速倍率，推荐 1.0-2.0（默认: 1.5）
  # format: "mp3"                                       # 音频输出格式: mp3, wav, pcm 等（默认: "mp3"）

  # --- 组合5: MiniMax + CodeBuddy总结 ---
  # engine: "minimax"
  # summarize_backend: "codebuddy"
  # summarize_model: "glm-5.1"
  # voice: "female-chengshu"
  # tts_model: "speech-2.8-hd"
  # language: "zh"
  # speed: 1.5
  # format: "mp3"

  # --- 组合6: Piper（本地离线，极速） ---
  # engine: "piper"
  # summarize_backend: "mmx"
  # summarize_model: "MiniMax-M2.7"
  # voice: "zh_CN-huayan-medium"                        # 模型名（不含.onnx扩展名），自动映射到 .clawbench/piper-models/<voice>.onnx
  #                                                    #   可用中文: zh_CN-huayan-medium, zh_CN-huayan-x_low, zh_CN-chaowen-medium
  #                                                    #   可用英文: en_US-lessac-medium, en_US-libritts-high 等
  #                                                    #   完整列表: https://github.com/rhasspy/piper/blob/master/VOICES.md
  # speed: 1                                            # 语速倍率，自动转换为 length_scale = 1/speed（1.5=1.5倍速）
  # piper:
  #   model_path: ""                                    # 模型文件绝对路径，留空则使用 .clawbench/piper-models/<voice>.onnx
  #   noise_scale: 0.667                                # 采样噪声比例，越大变化越多（默认: 0.667，范围: 0.0-1.0）
  #   length_scale: 1.0                                 # 语速调节，显式配置时优先于speed转换（越小越快，1.0=正常，0.5=2倍速）
  #   sentence_silence: 0.2                             # 句间停顿时长，单位秒（默认: 0.2）
  #
  # Piper 安装步骤：
  #   1. 下载二进制: https://github.com/rhasspy/piper/releases （解压到 .venv/piper/）
  #   2. 下载模型: https://hf-mirror.com/rhasspy/piper-voices （放到 .clawbench/piper-models/）
  #      需要两个文件: <模型名>.onnx 和 <模型名>.onnx.json

  # --- 组合7: Kokoro（本地离线，高质量中文语音） ---
  # engine: "kokoro"
  # summarize_backend: "mmx"
  # summarize_model: "MiniMax-M2.7"
  # voice: "zf_001"                                    # 音色名
  #                                                    #   v1.1 中文女声: zf_001, zf_002, zf_003, ...
  #                                                    #   v1.1 中文男声: zm_009, zm_010, zm_011, ...
  #                                                    #   v1.0 中文女声: zf_xiaobei, zf_shanshan, zf_xiaoyi
  #                                                    #   v1.0 中文男声: zm_yunxi, zm_yunjian
  #                                                    #   完整列表: https://huggingface.co/onnx-community/Kokoro-82M-v1.1-zh-ONNX
  # speed: 1                                            # 语速倍率（1.0=正常，1.5=1.5倍速）
  # kokoro:
  #   model_path: ""                                    # 模型文件路径，留空则使用 .clawbench/kokoro-models/kokoro-v1.1-zh.onnx
  #   voices_path: ""                                   # 音色文件路径，留空则使用 .clawbench/kokoro-models/voices-v1.1-zh.bin
  #   lang: "cmn"                                       # espeak语言代码（cmn=普通话，en-us=美式英语，默认: cmn）
  #
  # Kokoro 安装步骤：
  #   1. 安装 Python 依赖: pip install kokoro-onnx "misaki[zh]" soundfile （在 .venv 中）
  #   2. 下载 v1.1 中文模型: https://huggingface.co/onnx-community/Kokoro-82M-v1.1-zh-ONNX
  #      需要: onnx/model.onnx (重命名为 kokoro-v1.1-zh.onnx)
  #            voices/*.bin (需转换为 NPZ 格式的 voices-v1.1-zh.bin)
  #   3. 或者使用 v1.0 英文模型: https://github.com/thewh1teagle/kokoro-onnx/releases
  #      需要两个文件: kokoro-v1.0.onnx 和 voices-v1.0.bin

  # --- 组合8: Ollama总结（本地推理，无需云服务） ---
  # engine: "edge"
  # summarize_backend: "ollama"
  # summarize_model: "gemma3:270m"                       # Ollama 模型名（需预先 ollama pull）
  # ollama:
  #   base_url: "http://localhost:11434"                  # Ollama API 地址（默认: http://localhost:11434）
  # voice: "zh-CN-XiaoxiaoNeural"
  # speed: 1
  #
  # Ollama 安装步骤：
  #   1. 安装 Ollama: https://ollama.com/download
  #   2. 拉取模型: ollama pull gemma3:270m
  #   3. 确保 Ollama 服务运行中（默认监听 localhost:11434）

# 默认智能体（可选，留空则使用 agents/ 目录下的第一个智能体）
# 可用智能体：assistant（全能助手）、coder（编码专家）、handyman（勤杂工）、codebuddy2（Gemini）、gpt54（GPT）
default_agent: "assistant"

# 日志配置（可选）
# Linux/macOS 示例：.clawbench/logs（二进制同级目录下）
# Windows 示例：同上
log_dir: ".clawbench/logs"  # 日志目录，默认二进制同级 .clawbench/logs/
log_max_days: 7                # 日志保留天数，默认 7

# 端口转发配置（Android WebView 访问服务器本地端口）
proxy:
  enabled: true                # 启用端口转发代理
  allowed_ports: "1024-65535"  # 允许转发的端口范围（支持范围和离散端口，如 "3000,5173,8080"）

# SSH 隧道配置（远程开发端口转发）
# Android App 通过 SSH 隧道访问服务器本地端口，对应用完全透明
ssh:
  enabled: true                # 启用 SSH 隧道服务
  port: 0                      # SSH 端口（0 = 自动 = 主端口+1，如生产环境 20001；也可指定如 20020）
  host_key: ""                 # Host key 文件路径（空 = 自动生成，重启后变更；建议指定路径以持久化）
